<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon-sets skill: contact sheet. 8 line icons, one family.
       Grid 24x24 per icon (drawn here at 2x: live area ~40u, 2u padding scaled).
       Stroke 2.6 #0f172a, round caps/joins, monochrome. Cells 200x200, caption #94a3b8. -->
  <rect x="0" y="0" width="800" height="480" fill="#ffffff"/>
  <text x="400" y="34" text-anchor="middle" font-family="sans-serif" font-size="18"
        fill="#0f172a">Navigation icon set — 8 glyphs, one family</text>

  <!-- shared icon style: monochrome ink, uniform weight/terminals -->
  <g fill="none" stroke="#0f172a" stroke-width="2.6"
     stroke-linecap="round" stroke-linejoin="round">

    <!-- Row 1 -->
    <!-- home (cell center 100,120) -->
    <g transform="translate(100,120)">
      <path d="M-16 4 l16 -16 l16 16 v16 a2 2 0 0 1 -2 2 h-28 a2 2 0 0 1 -2 -2 z"/>
      <path d="M-4 22 v-12 h8 v12"/>
    </g>

    <!-- search (cell center 300,120) -->
    <g transform="translate(300,120)">
      <circle cx="-3" cy="-3" r="13"/>
      <path d="M7 7 l11 11"/>
    </g>

    <!-- bell (cell center 500,120) -->
    <g transform="translate(500,120)">
      <path d="M-13 9 h26 l-4 -6 v-9 a9 9 0 0 0 -18 0 v9 z"/>
      <path d="M-4 13 a4 4 0 0 0 8 0"/>
    </g>

    <!-- user (cell center 700,120) -->
    <g transform="translate(700,120)">
      <circle cx="0" cy="-8" r="8"/>
      <path d="M-15 18 a15 13 0 0 1 30 0"/>
    </g>

    <!-- Row 2 -->
    <!-- settings (cell center 100,300) -->
    <g transform="translate(100,300)">
      <circle cx="0" cy="0" r="6.5"/>
      <path d="M0 -19 v6 M0 13 v6 M-19 0 h6 M13 0 h6
               M-13.4 -13.4 l4.2 4.2 M9.2 9.2 l4.2 4.2
               M13.4 -13.4 l-4.2 4.2 M-9.2 9.2 l-4.2 4.2"/>
    </g>

    <!-- mail (cell center 300,300) -->
    <g transform="translate(300,300)">
      <rect x="-18" y="-13" width="36" height="26" rx="3"/>
      <path d="M-18 -10 l18 14 l18 -14"/>
    </g>

    <!-- heart (cell center 500,300) -->
    <g transform="translate(500,300)">
      <path d="M0 16 C-22 1 -16 -16 -2 -10 C0 -9 0 -9 0 -7
               C0 -9 0 -9 2 -10 C16 -16 22 1 0 16 Z"/>
    </g>

    <!-- add / plus circle (cell center 700,300) -->
    <g transform="translate(700,300)">
      <circle cx="0" cy="0" r="17"/>
      <path d="M-8 0 h16 M0 -8 v16"/>
    </g>
  </g>

  <!-- captions -->
  <g font-family="sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">
    <text x="100" y="172">home</text>
    <text x="300" y="172">search</text>
    <text x="500" y="172">bell</text>
    <text x="700" y="172">user</text>
    <text x="100" y="352">settings</text>
    <text x="300" y="352">mail</text>
    <text x="500" y="352">heart</text>
    <text x="700" y="352">add</text>
  </g>
</svg>
