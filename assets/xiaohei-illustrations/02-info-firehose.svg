<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg"
     font-family="'Bradley Hand','Comic Sans MS','Segoe Print',cursive">
  <defs>
    <filter id="wob" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="17" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="wobt" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="6" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#ffffff"/>

  <g filter="url(#wob)" fill="none" stroke="#1b1b1b" stroke-linecap="round" stroke-linejoin="round">

    <!-- GIANT FAUCET / TAP coming from upper-left -->
    <g stroke-width="3">
      <!-- horizontal supply pipe -->
      <path d="M70 168 L470 168" stroke-width="9"/>
      <!-- elbow down -->
      <path d="M470 150 L470 250 Q470 290 510 290 L560 290" stroke-width="9"/>
      <!-- spout opening -->
      <path d="M558 262 L612 262 L600 320 L570 320 Z" fill="#ffffff" stroke-width="3"/>
      <!-- valve wheel on top -->
      <path d="M300 168 L300 120" stroke-width="6"/>
      <ellipse cx="300" cy="104" rx="46" ry="18" fill="#ffffff" stroke-width="3"/>
      <path d="M270 104 L330 104 M300 90 L300 118" stroke-width="2"/>
    </g>

    <!-- THE TORRENT gushing down (wide, overwhelming) with little info-bits -->
    <g stroke-width="2.4">
      <path d="M572 322 Q540 470 470 700"/>
      <path d="M586 322 Q576 470 540 720"/>
      <path d="M600 322 Q620 470 660 700"/>
      <path d="M612 322 Q668 460 760 660"/>
      <path d="M566 322 Q470 460 380 660"/>
      <!-- info bits tumbling in the stream -->
      <path d="M520 410 L548 404 L552 430 L524 436 Z" fill="#ffffff" stroke-width="1.8"/>
      <path d="M612 470 L640 466 L644 492 L616 496 Z" fill="#ffffff" stroke-width="1.8"/>
      <path d="M470 520 L498 514 L502 540 L474 546 Z" fill="#ffffff" stroke-width="1.8"/>
      <path d="M660 560 L688 556 L692 582 L664 586 Z" fill="#ffffff" stroke-width="1.8"/>
    </g>

    <!-- XIAOHEI below, holding up a tiny cup, head tilted back -->
    <g>
      <path d="M548 470 C514 470 498 506 499 550 C500 600 512 648 548 650
               C584 648 596 600 597 550 C598 506 582 470 548 470 Z"
            fill="#1b1b1b" stroke="none"/>
      <!-- legs -->
      <path d="M532 648 L524 706" stroke="#1b1b1b" stroke-width="8"/>
      <path d="M510 706 L538 706" stroke="#1b1b1b" stroke-width="6"/>
      <path d="M566 648 L574 706" stroke="#1b1b1b" stroke-width="8"/>
      <path d="M560 706 L588 706" stroke="#1b1b1b" stroke-width="6"/>
      <!-- both arms raised holding the tiny cup overhead -->
      <path d="M512 540 Q486 480 470 452" stroke="#1b1b1b" stroke-width="8"/>
      <path d="M586 540 Q514 478 488 448" stroke="#1b1b1b" stroke-width="8"/>
    </g>

    <!-- TINY CUP catching almost nothing -->
    <g stroke-width="2.6">
      <path d="M452 432 L502 432 L494 470 L460 470 Z" fill="#ffffff"/>
      <path d="M502 442 Q522 446 520 462" stroke-width="2.2"/>
    </g>

    <!-- SPLASH / puddle at the feet with stranded info-bits -->
    <g stroke-width="2.2">
      <path d="M360 740 Q560 712 800 742 Q620 770 360 740 Z" fill="#ffffff"/>
      <path d="M430 736 L456 732 L460 754 L434 758 Z" fill="#ffffff" stroke-width="1.6"/>
      <path d="M560 744 L586 740 L590 762 L564 766 Z" fill="#ffffff" stroke-width="1.6"/>
      <path d="M676 738 L702 734 L706 756 L680 760 Z" fill="#ffffff" stroke-width="1.6"/>
      <!-- splash ticks -->
      <path d="M340 716 L322 700 M820 720 L842 702 M300 740 L278 740" stroke-width="2"/>
    </g>

  </g>

  <!-- EYES (crisp) — looking up at the torrent -->
  <circle cx="536" cy="536" r="7.5" fill="#ffffff"/>
  <circle cx="566" cy="536" r="7.5" fill="#ffffff"/>

  <!-- LABELS -->
  <text x="92" y="138" font-size="29" fill="#1b1b1b" filter="url(#wobt)"
        transform="rotate(-1 92 138)">one day of input</text>
  <text x="720" y="360" font-size="33" fill="#d83a2e" filter="url(#wobt)"
        transform="rotate(3 720 360)">the firehose</text>
  <text x="298" y="452" font-size="22" fill="#2f6fd0" filter="url(#wobt)"
        transform="rotate(-3 298 452)">what I can hold</text>
  <text x="600" y="812" font-size="29" fill="#d83a2e" filter="url(#wobt)"
        transform="rotate(-2 600 812)">can't drink it all</text>

</svg>
