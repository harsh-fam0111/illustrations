<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg"
     font-family="'Bradley Hand','Comic Sans MS','Segoe Print',cursive">
  <defs>
    <filter id="wob" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.011" numOctaves="2" seed="13" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="wobt" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="5" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7"
            orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10" fill="none" stroke="#ea7317" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ahb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10" fill="none" stroke="#ea7317" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- pure white canvas -->
  <rect width="1600" height="900" fill="#ffffff"/>

  <!-- =========================================================
       LINEWORK GROUP (wobble filter)
       ========================================================= -->
  <g filter="url(#wob)" fill="none" stroke="#1b1b1b" stroke-linecap="round" stroke-linejoin="round">

    <!-- == TOOL A box (left) == -->
    <g stroke-width="3">
      <!-- monitor body -->
      <path d="M148 340 L148 620 L368 620 L368 340 Z" fill="#ffffff" stroke="#1b1b1b"/>
      <!-- screen inner -->
      <path d="M172 366 L172 570 L344 570 L344 366 Z" fill="#f4f4f4" stroke="#1b1b1b" stroke-width="2"/>
      <!-- fake UI lines on screen -->
      <path d="M192 400 L324 400" stroke="#1b1b1b" stroke-width="1.8"/>
      <path d="M192 428 L290 428" stroke="#1b1b1b" stroke-width="1.8"/>
      <path d="M192 456 L310 456" stroke="#1b1b1b" stroke-width="1.8"/>
      <path d="M192 484 L270 484" stroke="#1b1b1b" stroke-width="1.8"/>
      <path d="M192 512 L300 512" stroke="#1b1b1b" stroke-width="1.8"/>
      <path d="M192 540 L255 540" stroke="#1b1b1b" stroke-width="1.8"/>
      <!-- monitor stand -->
      <path d="M258 620 L258 665 M218 665 L298 665"/>
    </g>

    <!-- == TOOL B box (right) == -->
    <g stroke-width="3">
      <path d="M1232 340 L1232 620 L1452 620 L1452 340 Z" fill="#ffffff" stroke="#1b1b1b"/>
      <path d="M1256 366 L1256 570 L1428 570 L1428 366 Z" fill="#f4f4f4" stroke="#1b1b1b" stroke-width="2"/>
      <!-- fake UI lines -->
      <path d="M1276 400 L1408 400" stroke="#1b1b1b" stroke-width="1.8"/>
      <path d="M1276 428 L1370 428" stroke="#1b1b1b" stroke-width="1.8"/>
      <path d="M1276 456 L1390 456" stroke="#1b1b1b" stroke-width="1.8"/>
      <path d="M1276 484 L1350 484" stroke="#1b1b1b" stroke-width="1.8"/>
      <path d="M1276 512 L1382 512" stroke="#1b1b1b" stroke-width="1.8"/>
      <path d="M1276 540 L1338 540" stroke="#1b1b1b" stroke-width="1.8"/>
      <path d="M1342 620 L1342 665 M1302 665 L1382 665"/>
    </g>

    <!-- DATA PACKET STACK (Xiaohei is carrying) -->
    <!-- 3 slightly skewed rectangles stacked, centred around x=800, y=470 -->
    <g stroke-width="2.5">
      <!-- bottom sheet -->
      <path d="M738 530 L738 570 L872 570 L872 530 Z" fill="#ffffff" stroke="#1b1b1b"/>
      <!-- line on it -->
      <path d="M754 543 L856 543" stroke="#1b1b1b" stroke-width="1.5"/>
      <path d="M754 557 L820 557" stroke="#1b1b1b" stroke-width="1.5"/>

      <!-- middle sheet (slightly offset) -->
      <path d="M732 490 L732 532 L866 532 L866 490 Z" fill="#ffffff" stroke="#1b1b1b"/>
      <path d="M748 502 L850 502" stroke="#1b1b1b" stroke-width="1.5"/>
      <path d="M748 516 L815 516" stroke="#1b1b1b" stroke-width="1.5"/>

      <!-- top sheet -->
      <path d="M726 450 L726 492 L860 492 L860 450 Z" fill="#ffffff" stroke="#1b1b1b"/>
      <path d="M742 463 L844 463" stroke="#1b1b1b" stroke-width="1.5"/>
      <path d="M742 477 L808 477" stroke="#1b1b1b" stroke-width="1.5"/>
    </g>

    <!-- XIAOHEI BODY -->
    <!-- mid-stride: leaning forward, centred around 800, lower torso ~620 -->
    <g transform="translate(800, 430)">
      <!-- body bean, slightly leaning right -->
      <path d="M-2 0 C(-42 2)(-58 42)(-56 92) C(-54 148)(-38 200)(2 202)
               C(42 200)(58 148)(56 92) C(54 42)(38 2)(-2 0) Z"
            fill="#1b1b1b" stroke="none"/>
      <!-- right arm reaching forward/down to grip stack -->
      <path d="M52 110 Q95 145 78 180" stroke="#1b1b1b" stroke-width="8" stroke-linecap="round"/>
      <!-- left arm swinging back -->
      <path d="M-52 110 Q-90 130 -100 155" stroke="#1b1b1b" stroke-width="8" stroke-linecap="round"/>
      <!-- left leg back -->
      <path d="M-20 202 Q-35 255 -55 295" stroke="#1b1b1b" stroke-width="9" stroke-linecap="round"/>
      <path d="M-55 295 L-80 295" stroke="#1b1b1b" stroke-width="7" stroke-linecap="round"/>
      <!-- right leg forward/stride -->
      <path d="M20 202 Q50 248 75 295" stroke="#1b1b1b" stroke-width="9" stroke-linecap="round"/>
      <path d="M75 295 L100 295" stroke="#1b1b1b" stroke-width="7" stroke-linecap="round"/>
    </g>

    <!-- ORANGE FLOW ARROWS -->
    <!-- Tool A to Xiaohei (upper arc) -->
    <path d="M370 440 Q560 320 720 465"
          stroke="#ea7317" stroke-width="3.5" fill="none"
          marker-end="url(#ah)"/>
    <!-- Xiaohei to Tool B (upper arc) -->
    <path d="M878 465 Q1040 320 1230 440"
          stroke="#ea7317" stroke-width="3.5" fill="none"
          marker-end="url(#ah)"/>

    <!-- dashed return arc below (repeating loop feel) -->
    <path d="M1232 600 Q800 760 368 600"
          stroke="#ea7317" stroke-width="2.2" fill="none"
          stroke-dasharray="12 8"
          marker-end="url(#ahb)"/>

    <!-- THOUGHT BUBBLE -->
    <!-- small rising circles -->
    <circle cx="800" cy="405" r="7" stroke="#1b1b1b" stroke-width="2"/>
    <circle cx="800" cy="380" r="11" stroke="#1b1b1b" stroke-width="2"/>
    <circle cx="800" cy="348" r="16" stroke="#1b1b1b" stroke-width="2"/>
    <!-- big empty oval at top -->
    <ellipse cx="800" cy="280" rx="105" ry="62" fill="#ffffff" stroke="#1b1b1b" stroke-width="2.5"/>

  </g>

  <!-- =========================================================
       EYES: crisp, outside wobble filter
       ========================================================= -->
  <!-- Xiaohei eyes at approx translate(800,430) + eye offsets within bean -->
  <circle cx="780" cy="487" r="8" fill="#ffffff"/>
  <circle cx="820" cy="487" r="8" fill="#ffffff"/>

  <!-- =========================================================
       LABELS: handwriting font, gentle wobble, slight rotation
       ========================================================= -->

  <!-- "Tool A" -->
  <text x="165" y="308" font-size="32" fill="#1b1b1b" filter="url(#wobt)"
        transform="rotate(-2 165 308)">Tool A</text>

  <!-- "Tool B" -->
  <text x="1248" y="308" font-size="32" fill="#1b1b1b" filter="url(#wobt)"
        transform="rotate(1 1248 308)">Tool B</text>

  <!-- "moving info all day" (red, below the dashed arc) -->
  <text x="640" y="810" font-size="30" fill="#d83a2e" filter="url(#wobt)"
        transform="rotate(-1.5 640 810)">moving info all day</text>

  <!-- "...thinking?" (blue, inside empty bubble) -->
  <text x="742" y="289" font-size="26" fill="#2f6fd0" filter="url(#wobt)"
        transform="rotate(-1 742 289)">...thinking?</text>

  <!-- small red label pointing to stack -->
  <text x="886" y="510" font-size="24" fill="#d83a2e" filter="url(#wobt)"
        transform="rotate(2 886 510)">copy-paste #47</text>

</svg>
