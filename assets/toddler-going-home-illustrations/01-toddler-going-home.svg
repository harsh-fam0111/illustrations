<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg"
     font-family="'Bradley Hand','Comic Sans MS','Segoe Print',cursive">
  <defs>
    <filter id="wob" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="3.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="wobt" x="-4%" y="-4%" width="108%" height="108%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8"
            orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9" fill="none" stroke="#ea7317" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#ffffff"/>

  <g filter="url(#wob)" fill="none" stroke="#1b1b1b" stroke-linecap="round" stroke-linejoin="round">

    <!-- Ground -->
    <path d="M60 728 Q800 720 1560 728" stroke-width="2.5"/>

    <!-- ======= SCHOOL (left) ======= -->
    <rect x="85" y="542" width="290" height="186" fill="#ffffff" stroke-width="3"/>
    <path d="M62 542 L230 428 L408 542" fill="#ffffff" stroke-width="3"/>
    <!-- Door (arched) -->
    <path d="M196 728 L196 652 C196 636 264 636 264 652 L264 728" stroke-width="3"/>
    <!-- Left window -->
    <rect x="105" y="574" width="56" height="50" rx="2" fill="#ffffff" stroke-width="2.2"/>
    <path d="M133 574 L133 624 M105 599 L161 599" stroke-width="1.8"/>
    <!-- Right window -->
    <rect x="300" y="574" width="56" height="50" rx="2" fill="#ffffff" stroke-width="2.2"/>
    <path d="M328 574 L328 624 M300 599 L356 599" stroke-width="1.8"/>
    <!-- Flagpole + red flag -->
    <path d="M230 428 L230 352" stroke-width="2.5"/>
    <path d="M230 352 L294 370 L230 388 Z" fill="#d83a2e" stroke="#d83a2e" stroke-width="1.5"/>
    <!-- Steps -->
    <path d="M182 728 L182 740 L278 740 L278 728" stroke-width="2.2"/>

    <!-- ======= HOME (right) ======= -->
    <rect x="1165" y="562" width="255" height="166" fill="#ffffff" stroke-width="3"/>
    <path d="M1143 562 L1292 462 L1441 562" fill="#ffffff" stroke-width="3"/>
    <!-- Door -->
    <path d="M1258 728 L1258 652 C1258 642 1320 642 1320 652 L1320 728" stroke-width="3"/>
    <!-- Left window -->
    <rect x="1182" y="592" width="50" height="44" rx="2" fill="#ffffff" stroke-width="2.2"/>
    <path d="M1207 592 L1207 636 M1182 614 L1232 614" stroke-width="1.8"/>
    <!-- Right window -->
    <rect x="1365" y="592" width="50" height="44" rx="2" fill="#ffffff" stroke-width="2.2"/>
    <path d="M1390 592 L1390 636 M1365 614 L1415 614" stroke-width="1.8"/>
    <!-- Chimney -->
    <rect x="1340" y="464" width="32" height="46" fill="#ffffff" stroke-width="2.5"/>
    <!-- Door knob -->
    <circle cx="1316" cy="692" r="5.5" fill="#1b1b1b" stroke="none"/>

    <!-- ======= ORANGE DASHED PATH (school → home) ======= -->
    <path d="M408 728 Q562 714 694 724 Q800 732 900 726 Q1010 720 1100 724 Q1132 726 1162 728"
          stroke="#ea7317" stroke-width="3.5" stroke-dasharray="15 9" marker-end="url(#ah)"/>

    <!-- ======= XIAOHEI — toddler walking right, school bag on back ======= -->
    <g transform="translate(730 488)">
      <!-- Backpack (sits on left/back side of body) -->
      <rect x="-68" y="24" width="28" height="44" rx="6" fill="#1b1b1b" stroke="none"/>
      <path d="M-40 28 C-28 24 -16 20 -4 22" stroke-width="2.2"/>
      <!-- Chubby toddler body bean -->
      <path d="M0 0 C-38 1 -53 32 -52 74 C-51 118 -37 145 0 146
               C37 145 51 118 52 74 C53 32 38 1 0 0 Z"
            fill="#1b1b1b" stroke="none"/>
      <!-- Back leg (trailing) -->
      <path d="M-18 143 L-28 200" stroke="#1b1b1b" stroke-width="5"/>
      <!-- Forward leg (stepping ahead) -->
      <path d="M18 143 L36 196" stroke="#1b1b1b" stroke-width="5"/>
      <!-- Back foot -->
      <path d="M-42 200 L-18 200" stroke="#1b1b1b" stroke-width="4"/>
      <!-- Front foot (angled forward) -->
      <path d="M26 194 L52 192" stroke="#1b1b1b" stroke-width="4"/>
      <!-- Arm swinging eager-forward -->
      <path d="M50 80 L78 108" stroke="#1b1b1b" stroke-width="3.5"/>
    </g>

    <!-- ======= THOUGHT BUBBLE connecting dots ======= -->
    <circle cx="746" cy="474" r="5.5" fill="#1b1b1b" stroke="none"/>
    <circle cx="762" cy="448" r="8"   fill="#1b1b1b" stroke="none"/>
    <circle cx="784" cy="416" r="11"  fill="#1b1b1b" stroke="none"/>
    <circle cx="812" cy="378" r="14"  fill="#1b1b1b" stroke="none"/>

    <!-- ======= THOUGHT BUBBLE cloud ======= -->
    <path d="M838 346
             C826 314 842 286 870 282
             C874 258 898 244 924 252
             C932 228 958 218 982 232
             C996 212 1028 214 1040 234
             C1064 224 1092 240 1090 264
             C1116 268 1128 294 1112 314
             C1122 332 1112 350 1094 354
             C1092 376 1070 386 1052 376
             C1044 392 1020 398 1006 384
             C994 398 968 398 956 384
             C942 398 916 396 906 382
             C886 390 864 378 862 358
             C842 358 826 350 838 346 Z"
          fill="#ffffff" stroke-width="2.5"/>

    <!-- Bouncy ball inside bubble -->
    <circle cx="912" cy="310" r="32" fill="#ffffff" stroke-width="2.5"/>
    <path d="M880 310 Q912 292 944 310" stroke-width="1.8"/>
    <path d="M880 310 Q912 328 944 310" stroke-width="1.8"/>
    <path d="M912 278 Q930 310 912 342"  stroke-width="1.5"/>

    <!-- Toy car inside bubble -->
    <rect x="970" y="298" width="54" height="28" rx="7" fill="#ffffff" stroke-width="2.2"/>
    <path d="M977 298 L988 278 L1016 278 L1027 298" stroke-width="2"/>
    <circle cx="986" cy="326" r="10" fill="#ffffff" stroke-width="2.2"/>
    <circle cx="1018" cy="326" r="10" fill="#ffffff" stroke-width="2.2"/>

    <!-- Sparkle / excitement star -->
    <path d="M1066 268 L1070 256 L1074 268 L1086 272 L1074 276 L1070 288 L1066 276 L1054 272 Z"
          fill="#d83a2e" stroke="none"/>

  </g>

  <!-- ======= EYES — crisp, outside wobble group ======= -->
  <!-- translate(730,488): local(-16,50)→(714,538) and local(16,50)→(746,538) -->
  <circle cx="714" cy="538" r="7.5" fill="#ffffff"/>
  <circle cx="746" cy="538" r="7.5" fill="#ffffff"/>

  <!-- ======= LABELS ======= -->
  <text x="148" y="800" font-size="30" fill="#1b1b1b" filter="url(#wobt)"
        transform="rotate(-1.5 148 800)">school</text>

  <text x="1222" y="800" font-size="30" fill="#1b1b1b" filter="url(#wobt)"
        transform="rotate(1 1222 800)">home!</text>

  <text x="858" y="194" font-size="32" fill="#d83a2e" filter="url(#wobt)"
        transform="rotate(-2 858 194)">gonna play!!</text>

  <text x="516" y="690" font-size="26" fill="#ea7317" filter="url(#wobt)"
        transform="rotate(-1 516 690)">almost there...</text>

</svg>
