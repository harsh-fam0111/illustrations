<svg viewBox="0 0 560 1080" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">
  <rect width="560" height="1080" fill="#f1f5f9"/>
  <!-- phone shell -->
  <rect x="40" y="30" width="480" height="1020" rx="46" fill="#ffffff" stroke="#0f172a" stroke-width="2.5"/>
  <!-- status bar -->
  <text x="74" y="78" font-size="20" font-weight="600" fill="#0f172a">9:41</text>
  <rect x="430" y="62" width="22" height="14" rx="3" fill="#0f172a"/>
  <rect x="458" y="64" width="28" height="12" rx="3" fill="#0f172a"/>

  <!-- lo-fi marker -->
  <text x="74" y="108" font-size="13" fill="#94a3b8">— lo-fi wireframe —</text>

  <!-- brand mark / logo placeholder -->
  <circle cx="280" cy="240" r="44" fill="#e2e8f0"/>
  <path d="M260 248 l14 -22 l12 16 l8 -10 l6 16 z" fill="#94a3b8"/>
  <!-- title bars -->
  <rect x="180" y="318" width="200" height="26" rx="8" fill="#cbd5e1"/>
  <rect x="210" y="356" width="140" height="14" rx="7" fill="#e2e8f0"/>

  <!-- email input field -->
  <rect x="74" y="430" width="64" height="12" rx="6" fill="#cbd5e1"/>
  <rect x="74" y="450" width="412" height="58" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <rect x="96" y="472" width="180" height="14" rx="7" fill="#e2e8f0"/>

  <!-- password input field -->
  <rect x="74" y="532" width="86" height="12" rx="6" fill="#cbd5e1"/>
  <rect x="74" y="552" width="412" height="58" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <rect x="96" y="574" width="150" height="14" rx="7" fill="#e2e8f0"/>
  <!-- eye icon -->
  <path d="M444 581 q14 -12 28 0 q-14 12 -28 0 z" fill="none" stroke="#94a3b8" stroke-width="2.4" stroke-linejoin="round"/>
  <circle cx="458" cy="581" r="3.5" fill="#94a3b8"/>

  <!-- forgot password link bar -->
  <rect x="330" y="630" width="156" height="12" rx="6" fill="#e2e8f0"/>

  <!-- primary action button (dark) -->
  <rect x="74" y="694" width="412" height="60" rx="14" fill="#0f172a"/>
  <rect x="232" y="717" width="96" height="14" rx="7" fill="#ffffff"/>

  <!-- secondary button (outline) -->
  <rect x="74" y="770" width="412" height="60" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="216" y="793" width="128" height="14" rx="7" fill="#cbd5e1"/>

  <!-- divider with label -->
  <line x1="74" y1="884" x2="240" y2="884" stroke="#e2e8f0" stroke-width="2"/>
  <rect x="256" y="878" width="48" height="12" rx="6" fill="#e2e8f0"/>
  <line x1="320" y1="884" x2="486" y2="884" stroke="#e2e8f0" stroke-width="2"/>

  <!-- sign up footer bar -->
  <rect x="150" y="950" width="260" height="14" rx="7" fill="#e2e8f0"/>
</svg>
